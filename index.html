<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goose Gen — AI Brand Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FAF3E3;
      --bg-dark:   #F0E6CC;
      --primary:   #C25048;
      --secondary: #485CC2;
      --text:      #1A1410;
      --muted:     #5A4F40;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LANDING ── */
    #landing {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated deco circles */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      border: 2px dashed;
      opacity: 0.1;
      pointer-events: none;
    }
    .dc1 { width: 340px; height: 340px; top: -100px; left: -80px; border-color: var(--primary); animation: spin 40s linear infinite; }
    .dc2 { width: 500px; height: 500px; bottom: -140px; right: -100px; border-color: var(--secondary); animation: spin 55s linear infinite reverse; }
    .dc3 { width: 180px; height: 180px; top: 30%; right: 10%; border-color: var(--primary); animation: spin 25s linear infinite; opacity: 0.07; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scattered stars */
    .scatter {
      position: absolute;
      pointer-events: none;
      font-size: 1rem;
      opacity: 0.3;
      color: var(--primary);
      z-index: 1;
    }

    /* Wave bottom */
    .wave-bottom {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 1;
    }

    /* Hero content */
    .hero {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 700px;
      width: 100%;
    }

    .hero-logo {
      font-family: 'Caveat', cursive;
      font-size: clamp(5rem, 13vw, 9.5rem);
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .hero-logo em { color: var(--secondary); font-style: normal; }

    .hero-tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-style: italic;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    .star-row {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .st      { color: var(--primary);   opacity: 0.4; font-size: 1rem; }
    .st.blue { color: var(--secondary); opacity: 0.35; }
    .st.sm   { font-size: 0.6rem; opacity: 0.22; }

    /* Button */
    .btn-fill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.85rem 2.4rem;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: var(--secondary);
      color: #fff;
      box-shadow: 4px 4px 0 rgba(72,92,194,0.3);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      text-decoration: none;
    }
    .btn-fill:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(72,92,194,0.3); }
    .btn-fill:active { transform: translate(1px,1px);   box-shadow: 2px 2px 0 rgba(72,92,194,0.3); }
  </style>
</head>
<body>

<div id="landing">

  <!-- Deco circles -->
  <div class="deco-circle dc1"></div>
  <div class="deco-circle dc2"></div>
  <div class="deco-circle dc3"></div>

  <!-- Scattered stars -->
  <span class="scatter" style="top:10%;left:16%">✦</span>
  <span class="scatter" style="top:20%;right:14%;color:var(--secondary);font-size:0.7rem;opacity:0.22">✦</span>
  <span class="scatter" style="top:55%;left:8%;font-size:1.3rem;opacity:0.18">✦</span>
  <span class="scatter" style="top:42%;right:20%;font-size:0.6rem;opacity:0.2;color:var(--secondary)">✦</span>
  <span class="scatter" style="bottom:25%;right:9%;font-size:1rem;opacity:0.22">✦</span>
  <span class="scatter" style="bottom:38%;left:24%;font-size:0.7rem;opacity:0.18;color:var(--secondary)">✦</span>

  <div class="hero">
    <div class="star-row">
      <span class="st">✦</span>
      <span class="st sm">✦</span>
      <span class="st blue">✦</span>
    </div>

    <h1 class="hero-logo">Goose <em>Gen</em></h1>

    <p class="hero-tagline">
      สร้างภาพแบรนด์ของคุณ<br>ง่ายกว่าที่คิด
    </p>

    <div class="star-row" style="margin-bottom:2rem">
      <span class="st blue sm">✦</span>
      <span class="st">✦</span>
      <span class="st sm">✦</span>
    </div>

    <a href="form.html" class="btn-fill">เริ่มต้นเลย →</a>
  </div>

  <svg class="wave-bottom" viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,50 C200,90 400,10 600,50 C800,90 1000,10 1200,55 C1320,80 1380,30 1440,50 L1440,100 L0,100Z" fill="#F0E6CC" opacity="0.55"/>
    <path d="M0,70 C240,30 480,90 720,60 C960,30 1200,80 1440,55 L1440,100 L0,100Z" fill="#F0E6CC" opacity="0.35"/>
  </svg>

</div>

</body>
</html>
